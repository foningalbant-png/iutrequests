<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IUTRequests - Administration</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231565C0'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='14' fill='white'%3EIUT%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="../assets/css/style.css?v=8">
</head>
<body>
  <div id="app"><div class="loading-page" style="min-height:100vh"><div class="spinner"></div><p>Chargement...</p></div></div>
  <script src="../assets/js/config.js?v=8"></script>
  <script src="../assets/js/i18n.js?v=8"></script>
  <script src="../assets/js/auth.js?v=8"></script>
  <script>
  const Admin = {
    init() {
      document.documentElement.setAttribute('data-theme', localStorage.getItem('iut-theme') || 'light');
      window.addEventListener('hashchange', () => this.route());
      this.route();
    },

    async route() {
      const hash = location.hash.slice(1) || '/';
      const user = Auth.getUser();
      if (hash === '/login' || !user || user.role !== 'ADMIN') {
        if (hash !== '/login' && (!user || user.role !== 'ADMIN')) { this.showLogin(); return; }
        if (hash === '/login') { this.showLogin(); return; }
      }
      const path = hash.split('?')[0];
      // Afficher loading
      const app = document.getElementById('app');
      if (path !== '/login') {
        app.innerHTML = this.layout('<div class="loading-page"><div class="spinner"></div><p>Chargement...</p></div>', path);
      }
      let c = '';
      switch (path) {
        case '/': case '/dashboard': c = await this.pgDash(); break;
        case '/requests': c = await this.pgReqs(); break;
        case '/notifications': c = await this.pgNotifs(); break;
        case '/profile': c = this.pgProfile(); break;
        default:
          if (path.startsWith('/requests/')) c = await this.pgReqDetail(path.split('/')[2]);
          else c = '<div class="empty-state mt-4"><h2>Page non trouvee</h2></div>';
      }
      app.innerHTML = this.layout(c, path);
      window.scrollTo(0, 0);
    },

    layout(content, path) {
      const u = Auth.getUser();
      const links = [
        {p:'/dashboard',l:'Tableau de bord',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>'},
        {p:'/requests',l:'Requetes',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>'},
        {p:'/notifications',l:'Notifications',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>'},
        {p:'/profile',l:'Profil',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'},
      ];
      return `
      <header class="header"><div class="header-inner">
        <div class="header-left">
          <button class="header-btn mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <a class="header-logo" href="#/dashboard"><img src="../assets/images/logo.png" alt="IUT" onerror="this.style.display='none'"><span class="header-logo-text">IUTRequests <span style="font-size:12px;opacity:0.7;font-weight:400">Admin</span></span></a>
        </div>
        <div class="header-right">
          <button class="header-btn" onclick="Admin.toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${document.documentElement.getAttribute('data-theme')==='dark'?'<circle cx="12" cy="12" r="5"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'}</svg></button>
          <div class="user-menu"><button class="user-menu-trigger" onclick="this.nextElementSibling.classList.toggle('hidden')"><div class="user-avatar">${(u.first_name||'A')[0]}${(u.last_name||'')[0]||''}</div><span class="user-name">${u.first_name||''} ${u.last_name||''}</span></button>
            <div class="dropdown hidden"><div class="dropdown-header"><div class="dropdown-header-name">${u.first_name||''} ${u.last_name||''}</div><div class="dropdown-header-email">${u.email}</div></div><a href="#/profile" class="dropdown-item" onclick="document.querySelectorAll('.dropdown').forEach(d=>d.classList.add('hidden'))">Profil</a><div class="dropdown-divider"></div><button class="dropdown-item dropdown-item-danger" onclick="Auth.logout();location.hash='#/login'">Deconnexion</button></div>
          </div>
        </div>
      </div></header>
      <aside class="sidebar" id="sidebar"><nav class="sidebar-nav">
        ${links.map(l=>{const a=path===l.p||(l.p!=='/dashboard'&&path.startsWith(l.p));return '<a href="#'+l.p+'" class="sidebar-link '+(a?'active':'')+'" onclick="document.getElementById(\'sidebar\').classList.remove(\'open\')">'+l.i+' '+l.l+'</a>'}).join('')}
      </nav></aside>
      <main class="main-content main-with-sidebar">${content}</main>
      <div id="toast-container" class="toast-container"></div><div id="modal-root"></div>`;
    },

    showLogin() {
      document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-alt);padding:20px">
        <div style="width:100%;max-width:440px">
          <div style="text-align:center;margin-bottom:28px">
            <div style="width:64px;height:64px;border-radius:16px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
            <h1 style="font-size:1.5rem;font-family:Poppins,sans-serif;font-weight:700">Espace Administrateur</h1>
            <p style="color:var(--text-secondary);font-size:14px;margin-top:4px">Connectez-vous avec vos identifiants</p>
          </div>
          <div class="card">
            <form onsubmit="return Admin.handleLogin(event)">
              <div class="form-group"><label class="form-label">Adresse e-mail</label><input type="email" class="form-input" id="admin-email" required placeholder="votre@email.com"></div>
              <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" class="form-input" id="admin-password" required></div>
              <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="admin-login-btn">Se connecter</button>
            </form>
          </div>
          <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:16px"><a href="../index.html" style="color:var(--primary)">Retour au site principal</a></p>
        </div>
      </div><div id="toast-container" class="toast-container"></div>`;
    },

    async handleLogin(e) {
      e.preventDefault();
      document.getElementById('admin-login-btn').textContent = 'Connexion...';
      const r = await Auth.loginAdmin(document.getElementById('admin-email').value, document.getElementById('admin-password').value);
      if (r.success) { location.hash = '#/dashboard'; this.route(); }
      else { Utils.toast(r.message, 'error'); document.getElementById('admin-login-btn').textContent = 'Se connecter'; }
      return false;
    },

    toggleTheme() { const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('iut-theme',t); this.route(); },

    async pgDash() {
      const u = Auth.getUser();
      const reqs = await RequestStore.getAll();
      const pending = reqs.filter(r=>['SUBMITTED','RECEIVED'].includes(r.status)).length;
      const inProgress = reqs.filter(r=>r.status==='IN_PROGRESS').length;
      const validated = reqs.filter(r=>['VALIDATED','PROCESSED'].includes(r.status)).length;
      const oldest = reqs.filter(r=>['SUBMITTED','RECEIVED','IN_PROGRESS'].includes(r.status)).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)).slice(0,8);
      return `
      <div class="page-header"><div><h1 class="page-title">Bienvenue, ${u.first_name||''}</h1><p class="page-subtitle">Administrateur</p></div></div>
      <div class="stats-grid mb-3">
        <div class="card stat-card"><div class="stat-icon" style="background:var(--primary-light);color:var(--primary)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div><div><div class="stat-value">${reqs.length}</div><div class="stat-label">Total requetes</div></div></div>
        <div class="card stat-card"><div class="stat-icon" style="background:var(--yellow-light);color:var(--yellow-dark)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="stat-value">${pending}</div><div class="stat-label">En attente</div></div></div>
        <div class="card stat-card"><div class="stat-icon" style="background:#E3F2FD;color:#1565C0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div><div class="stat-value">${inProgress}</div><div class="stat-label">En cours</div></div></div>
        <div class="card stat-card"><div class="stat-icon" style="background:var(--green-light);color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div><div class="stat-value">${validated}</div><div class="stat-label">Validees</div></div></div>
      </div>
      ${oldest.length>0?'<div class="card"><div class="card-header"><span class="card-title">Requetes en attente les plus anciennes</span><a href="#/requests" class="btn btn-ghost btn-sm">Tout</a></div><div class="table-container"><table><thead><tr><th>Reference</th><th>Objet</th><th>Etudiant</th><th>Matricule</th><th>Statut</th><th>Date</th></tr></thead><tbody>'+oldest.map(r=>'<tr style="cursor:pointer" onclick="location.hash=\'#/requests/'+r.id+'\'"><td class="font-mono text-primary" style="font-size:13px">'+r.reference_number+'</td><td>'+Utils.escapeHtml(r.title)+'</td><td class="text-secondary" style="font-size:13px">'+(r.student_name||'')+'</td><td class="text-muted" style="font-size:13px">'+(r.student_matricule||'')+'</td><td>'+Utils.statusBadge(r.status)+'</td><td class="text-muted" style="font-size:13px">'+Utils.formatDate(r.created_at)+'</td></tr>').join('')+'</tbody></table></div></div>':'<div class="card"><div class="empty-state"><p>Aucune requete en attente.</p></div></div>'}`;
    },

    async pgReqs() {
      const all = await RequestStore.getAll();
      const search = localStorage.getItem('adm-search')||'';
      let reqs = search ? all.filter(r=>(r.reference_number||'').toLowerCase().includes(search.toLowerCase())||(r.title||'').toLowerCase().includes(search.toLowerCase())||(r.student_name||'').toLowerCase().includes(search.toLowerCase())) : all;
      return `
      <div class="page-header"><h1 class="page-title">Requetes (${all.length})</h1></div>
      <div class="card">
        <div class="filters"><div class="search-wrapper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="form-input" placeholder="Rechercher..." value="${Utils.escapeHtml(search)}" oninput="localStorage.setItem('adm-search',this.value);Admin.route()"></div>${search?'<button class="btn btn-ghost btn-sm" onclick="localStorage.removeItem(\'adm-search\');Admin.route()">Reinitialiser</button>':''}</div>
        ${reqs.length>0?'<div class="table-container"><table><thead><tr><th>Reference</th><th>Objet</th><th>Etudiant</th><th>Matricule</th><th>Statut</th><th>Date</th></tr></thead><tbody>'+reqs.map(r=>'<tr style="cursor:pointer" onclick="location.hash=\'#/requests/'+r.id+'\'"><td class="font-mono text-primary" style="font-size:13px">'+r.reference_number+'</td><td>'+Utils.escapeHtml(r.title)+'</td><td class="text-secondary" style="font-size:13px">'+(r.student_name||'')+'</td><td class="text-muted" style="font-size:13px">'+(r.student_matricule||'')+'</td><td>'+Utils.statusBadge(r.status)+'</td><td class="text-muted" style="font-size:13px">'+Utils.formatDate(r.created_at)+'</td></tr>').join('')+'</tbody></table></div>':'<div class="empty-state"><p>Aucune requete</p></div>'}
      </div>`;
    },

    async pgReqDetail(id) {
      const req = await RequestStore.getById(id);
      if (!req) return '<div class="empty-state"><h2>Requete non trouvee</h2><a href="#/requests" class="btn btn-primary mt-2">Retour</a></div>';
      const u = Auth.getUser();
      const msgs = await RequestStore.getMessages(id);
      const hist = await RequestStore.getHistory(id);
      let fileUrls = []; try { fileUrls = typeof req.file_urls === 'string' ? JSON.parse(req.file_urls) : (req.file_urls||[]); } catch(e){}
      if (!req.first_viewed_at) {
        await RequestStore.update(id, { first_viewed_at: new Date().toISOString() });
        if (req.student_id) await NotifStore.create({ user_id: req.student_id, type: 'REQUEST_READ', title: 'Requete consultee', message: 'Votre requete '+req.reference_number+' a ete consultee.', request_id: req.id, request_ref: req.reference_number });
      }
      const statusOpts = Object.keys(CONFIG.STATUSES).map(s=>'<option value="'+s+'">'+CONFIG.STATUSES[s].fr+'</option>').join('');
      const admins = await Auth.getAdmins();
      const adminOpts = admins.filter(a=>a.id!==u.id).map(a=>'<option value="'+a.id+'">'+(a.first_name||'')+' '+(a.last_name||'')+' ('+a.email+')</option>').join('');

      return `
      <div class="flex items-center gap-2 mb-3">
        <a href="#/requests" class="btn btn-ghost btn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div class="flex-1"><h1 class="page-title" style="font-size:1.25rem">${Utils.escapeHtml(req.title)}</h1><p class="text-muted font-mono" style="font-size:13px">${req.reference_number}</p></div>
        ${Utils.statusBadge(req.status)}
        <button class="btn btn-ghost btn-sm" onclick="window.print()">Imprimer</button>
        <button class="btn btn-danger btn-sm" onclick="if(confirm('Supprimer ?')){RequestStore.delete('${id}').then(()=>{Utils.toast('Supprimee','success');location.hash='#/requests'})}">Supprimer</button>
      </div>
      <div class="grid" style="grid-template-columns:2fr 1fr;gap:24px">
        <div>
          <div class="card mb-3"><h3 class="card-title mb-2">Description</h3><p style="white-space:pre-wrap;font-size:14px;color:var(--text-secondary)">${Utils.escapeHtml(req.description)}</p>
            ${(req.file_names||[]).length>0?'<h4 style="margin-top:16px;font-size:13px;color:var(--text-muted)">Pieces jointes ('+req.file_names.length+') :</h4><div class="file-list">'+req.file_names.map((name,i)=>{const url=fileUrls[i]?(typeof fileUrls[i]==='string'?fileUrls[i]:fileUrls[i].url):null;return '<div class="file-item"><div class="file-item-info"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg> '+Utils.escapeHtml(name)+'</div>'+(url?'<a href="'+url+'" target="_blank" class="btn btn-sm btn-outline" style="font-size:11px">Telecharger</a>':'')+'</div>'}).join('')+'</div>':''}
          </div>
          <div class="card mb-3"><h3 class="card-title mb-2">Messages</h3>
            <div class="messages-container">${msgs.map(m=>'<div class="message '+(m.sender_role==='ADMIN'?'message-sent':'message-received')+'"><div class="message-bubble"><div class="message-sender">'+Utils.escapeHtml(m.sender_name||'')+(m.sender_role==='ADMIN'?' (Admin)':'')+'</div>'+Utils.escapeHtml(m.content)+'<div class="message-meta">'+Utils.formatDateTime(m.created_at)+'</div></div></div>').join('')||'<p class="text-center text-muted" style="padding:20px;font-size:14px">Aucun message</p>'}</div>
            <div class="message-input-bar"><input type="text" class="form-input" id="msg-input" placeholder="Ecrire un message..." onkeydown="if(event.key==='Enter')Admin.sendMsg('${id}')"><button class="btn btn-primary" onclick="Admin.sendMsg('${id}')">Envoyer</button></div>
          </div>
        </div>
        <div>
          <div class="card mb-3">
            <h4 style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px">Etudiant</h4>
            <p class="fw-600" style="font-size:16px">${req.student_name||'-'}</p>
            <p style="font-size:13px;color:var(--primary);font-weight:600;margin-top:4px">Matricule : ${req.student_matricule||'Non renseigne'}</p>
            <p class="text-muted" style="font-size:13px">${req.student_email||''}</p>
            <p class="text-muted" style="font-size:13px">${req.student_phone||''}</p>
            <p class="text-muted" style="font-size:13px">${req.department||''} ${req.program?' - '+req.program:''}</p>
            ${['VALIDATED','PROCESSED'].includes(req.status)?'<div class="contact-grid mt-2"><a href="tel:'+(req.student_phone||'')+'" class="contact-btn contact-phone">Appeler</a><a href="https://wa.me/'+((req.student_phone||'').replace(/\\D/g,''))+'" target="_blank" class="contact-btn contact-whatsapp">WhatsApp</a><a href="mailto:'+(req.student_email||'')+'" class="contact-btn contact-email">E-mail</a></div>':''}
          </div>
          <div class="card mb-3">
            <h4 style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px">Actions</h4>
            <div class="form-group"><label class="form-label">Changer le statut</label><select class="form-select" id="status-sel">${statusOpts}</select></div>
            <div class="form-group"><label class="form-label">Motif</label><input class="form-input" id="status-reason" placeholder="Motif..."></div>
            <button class="btn btn-primary btn-sm" onclick="Admin.changeStatus('${id}')">Appliquer</button>
            ${adminOpts?'<hr style="border:none;border-top:1px solid var(--border);margin:12px 0"><div class="form-group"><label class="form-label">Transferer</label><select class="form-select" id="transfer-sel"><option value="">--</option>'+adminOpts+'</select></div><button class="btn btn-outline btn-sm" onclick="Admin.transferReq(\''+id+'\')">Transferer</button>':''}
          </div>
          <div class="card mb-3"><h4 style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px">Informations</h4><div style="font-size:14px"><div class="flex justify-between mb-1"><span class="text-muted">Categorie</span><span>${req.category_name||'-'}</span></div><div class="flex justify-between mb-1"><span class="text-muted">Departement</span><span>${req.department||'-'}</span></div><div class="flex justify-between mb-1"><span class="text-muted">Cree le</span><span style="font-size:12px">${Utils.formatDateTime(req.created_at)}</span></div><div class="flex justify-between mb-1"><span class="text-muted">Relances</span><span>${req.reminder_count||0}</span></div></div></div>
          ${hist.length>0?'<div class="card"><h4 style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px">Historique</h4><div class="timeline">'+hist.map(h=>'<div class="timeline-item"><div class="timeline-content">'+Utils.statusBadge(h.status)+(h.reason?'<p style="font-size:12px;color:var(--text-muted);margin-top:4px">'+Utils.escapeHtml(h.reason)+'</p>':'')+'<p class="timeline-date">'+(h.changed_by||'')+' - '+Utils.formatDateTime(h.created_at)+'</p></div></div>').join('')+'</div></div>':''}
        </div>
      </div>`;
    },

    async sendMsg(id) {
      const input = document.getElementById('msg-input');
      if (!input||!input.value.trim()) return;
      const u = Auth.getUser();
      await RequestStore.addMessage(id, u.id, (u.first_name||'')+' '+(u.last_name||''), 'ADMIN', input.value.trim());
      this.route();
    },

    async changeStatus(id) {
      const s = document.getElementById('status-sel').value;
      const r = document.getElementById('status-reason').value;
      const u = Auth.getUser();
      await RequestStore.updateStatus(id, s, r, (u.first_name||'')+' '+(u.last_name||''));
      Utils.toast('Statut mis a jour', 'success');
      this.route();
    },

    async transferReq(id) {
      const adminId = document.getElementById('transfer-sel').value;
      if (!adminId) { Utils.toast('Selectionnez un administrateur', 'error'); return; }
      Utils.toast('Requete transferee', 'success');
      this.route();
    },

    async pgNotifs() {
      const u = Auth.getUser();
      const ns = await NotifStore.getAll(u.id);
      const unread = ns.filter(n=>!n.is_read).length;
      return `
      <div class="page-header"><div><h1 class="page-title">Notifications</h1>${unread>0?'<p class="page-subtitle">'+unread+' non lues</p>':''}</div>${unread>0?'<button class="btn btn-outline btn-sm" onclick="NotifStore.markAllAsRead(\''+u.id+'\').then(()=>Admin.route())">Tout marquer comme lu</button>':''}</div>
      <div class="card" style="padding:0">
        ${ns.length>0?ns.map(n=>'<div style="display:flex;align-items:flex-start;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);'+(n.is_read?'':'background:rgba(21,101,192,0.04)')+';cursor:pointer" onclick="NotifStore.markAsRead(\''+n.id+'\').then(()=>{'+( n.request_id?'location.hash=\'#/requests/'+n.request_id+'\'':'Admin.route()')+'})"><div style="width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0;background:'+(n.is_read?'transparent':'var(--primary)')+'"></div><div style="flex:1"><p class="fw-600" style="font-size:14px">'+Utils.escapeHtml(n.title)+'</p><p class="text-secondary" style="font-size:13px;margin-top:2px">'+Utils.escapeHtml(n.message)+'</p><p class="text-muted" style="font-size:12px;margin-top:4px">'+Utils.timeAgo(n.created_at)+'</p></div></div>').join(''):'<div class="empty-state"><p>Aucune notification</p></div>'}
      </div>`;
    },

    pgProfile() {
      const u = Auth.getUser();
      return `<div style="max-width:640px"><h1 class="page-title mb-3">Mon profil</h1><div class="card"><div class="flex items-center gap-3 mb-3"><div class="user-avatar" style="width:56px;height:56px;font-size:20px">${(u.first_name||'A')[0]}${(u.last_name||'')[0]||''}</div><div><p class="fw-600" style="font-size:18px">${u.first_name||''} ${u.last_name||''}</p><p class="text-muted" style="font-size:13px">${u.email}</p><p class="text-muted" style="font-size:13px">Administrateur</p></div></div><form onsubmit="return Admin.updateProfile(event)"><div class="form-row"><div class="form-group"><label class="form-label">Prenom</label><input class="form-input" id="p-fn" value="${u.first_name||''}"></div><div class="form-group"><label class="form-label">Nom</label><input class="form-input" id="p-ln" value="${u.last_name||''}"></div></div><div class="form-group"><label class="form-label">Telephone</label><input class="form-input" id="p-ph" value="${u.phone||''}"></div><button type="submit" class="btn btn-primary">Enregistrer</button></form></div></div>`;
    },

    async updateProfile(e) {
      e.preventDefault();
      await Auth.updateProfile({ first_name: document.getElementById('p-fn').value, last_name: document.getElementById('p-ln').value, phone: document.getElementById('p-ph').value });
      Utils.toast('Profil mis a jour', 'success');
      this.route();
      return false;
    },
  };
  document.addEventListener('DOMContentLoaded', () => Admin.init());
  </script>
</body>
</html>
