<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IUTRequests - Super Administration">
  <title>IUTRequests - Super Administration</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230D47A1'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='14' fill='white'%3ESA%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="../assets/css/style.css?v=6">
</head>
<body>
  <div id="app"><div class="loading-page" style="min-height:100vh"><div class="spinner"></div><p>Chargement...</p></div></div>
  <script src="../assets/js/config.js?v=6"></script>
  <script src="../assets/js/i18n.js?v=6"></script>
  <script src="../assets/js/auth.js?v=6"></script>
  <script>
  const SA = {
    init() {
      document.documentElement.setAttribute('data-theme', localStorage.getItem('iut-theme') || 'light');
      window.addEventListener('hashchange', () => this.route());
      this.route();
    },

    route() {
      const hash = location.hash.slice(1) || '/';
      const user = Auth.getUser();
      if (hash === '/login' || !user || user.role !== 'SUPER_ADMIN') {
        if (hash !== '/login' && (!user || user.role !== 'SUPER_ADMIN')) { this.showLogin(); return; }
        if (hash === '/login') { this.showLogin(); return; }
      }
      const path = hash.split('?')[0];
      let c = '';
      switch (path) {
        case '/': case '/dashboard': c = this.pgDash(); break;
        case '/requests': c = this.pgReqs(); break;
        case '/departments': c = this.pgDepts(); break;
        case '/programs': c = this.pgProgs(); break;
        case '/categories': c = this.pgCats(); break;
        case '/admins': c = this.pgAdmins(); break;
        case '/superadmins': c = this.pgSuperAdmins(); break;
        case '/users': c = this.pgUsers(); break;
        case '/audit': c = this.pgAudit(); break;
        case '/notifications': c = this.pgNotifs(); break;
        case '/profile': c = this.pgProfile(); break;
        default:
          if (path.startsWith('/requests/')) c = this.pgReqDetail(path.split('/')[2]);
          else c = '<div class="empty-state mt-4"><h2>Page non trouvee</h2></div>';
      }
      document.getElementById('app').innerHTML = this.layout(c, path);
      window.scrollTo(0, 0);
    },

    layout(content, path) {
      const user = Auth.getUser();
      const unread = NotifStore.getUnreadCount(user.id);
      const links = [
        {p:'/dashboard',l:'Tableau de bord',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>'},
        {p:'/requests',l:'Toutes les requetes',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>'},
        {s:'Administration'},
        {p:'/departments',l:'Departements',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>'},
        {p:'/programs',l:'Filieres',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>'},
        {p:'/categories',l:'Categories',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'},
        {p:'/admins',l:'Administrateurs',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'},
        {p:'/superadmins',l:'Super Admins',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>'},
        {p:'/users',l:'Tous les comptes',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>'},
        {p:'/audit',l:'Journal d\'audit',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>'},
        {s:'Personnel'},
        {p:'/notifications',l:'Notifications',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>'},
        {p:'/profile',l:'Mon profil',i:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'},
      ];
      return `
      <header class="header"><div class="header-inner">
        <div class="header-left">
          <button class="header-btn mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <a class="header-logo" href="#/dashboard"><img src="../assets/images/logo.png" alt="IUT" onerror="this.style.display='none'"><span class="header-logo-text">IUTRequests <span style="font-size:11px;opacity:0.8;font-weight:400;background:var(--primary);padding:2px 8px;border-radius:4px;margin-left:4px">Super Admin</span></span></a>
        </div>
        <div class="header-right">
          <button class="header-btn" onclick="SA.toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${document.documentElement.getAttribute('data-theme')==='dark'?'<circle cx="12" cy="12" r="5"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'}</svg></button>
          <a href="#/notifications" class="header-btn">${unread>0?'<span class="header-badge-count">'+unread+'</span>':''}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg></a>
          <div class="user-menu"><button class="user-menu-trigger" onclick="this.nextElementSibling.classList.toggle('hidden')"><div class="user-avatar">${user.firstName?.[0]||'S'}${user.lastName?.[0]||'A'}</div><span class="user-name">${user.firstName}</span></button>
            <div class="dropdown hidden"><div class="dropdown-header"><div class="dropdown-header-name">${user.firstName} ${user.lastName}</div><div class="dropdown-header-email">${user.email}</div></div><a href="#/profile" class="dropdown-item" onclick="document.querySelectorAll('.dropdown').forEach(d=>d.classList.add('hidden'))">Profil</a><div class="dropdown-divider"></div><button class="dropdown-item dropdown-item-danger" onclick="Auth.logout();location.hash='#/login'">Deconnexion</button></div>
          </div>
        </div>
      </div></header>
      <aside class="sidebar" id="sidebar"><nav class="sidebar-nav">
        ${links.map(l=>{if(l.s)return '<div class="sidebar-section">'+l.s+'</div>';const a=path===l.p||(l.p!=='/dashboard'&&path.startsWith(l.p));return '<a href="#'+l.p+'" class="sidebar-link '+(a?'active':'')+'" onclick="document.getElementById(\'sidebar\').classList.remove(\'open\')">'+l.i+' '+l.l+'</a>'}).join('')}
      </nav></aside>
      <main class="main-content main-with-sidebar">${content}</main>
      <div id="toast-container" class="toast-container"></div><div id="modal-root"></div>`;
    },

    showLogin() {
      document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-alt);padding:20px">
        <div style="width:100%;max-width:440px">
          <div style="text-align:center;margin-bottom:28px">
            <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0D47A1,#1565C0);display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg></div>
            <h1 style="font-size:1.5rem;font-family:Poppins,sans-serif;font-weight:700">Super Administration</h1>
            <p style="color:var(--text-secondary);font-size:14px;margin-top:4px">Acces reserve au Super Administrateur</p>
          </div>
          <div class="card">
            <form onsubmit="return SA.handleLogin(event)">
              <div class="form-group"><label class="form-label">Adresse e-mail</label><input type="email" class="form-input" id="sa-email" required placeholder="votre@email.com"></div>
              <div class="form-group"><label class="form-label">Mot de passe</label><input type="password" class="form-input" id="sa-password" required></div>
              <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Connexion</button>
            </form>
          </div>
          <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:16px"><a href="../index.html" style="color:var(--primary)">Retour au site principal</a></p>
        </div>
      </div><div id="toast-container" class="toast-container"></div>`;
    },

    handleLogin(e) {
      e.preventDefault();
      const r = Auth.loginSuperAdmin(document.getElementById('sa-email').value, document.getElementById('sa-password').value);
      if (r.success) { SA.addAudit('CONNEXION','Super Admin connecte'); location.hash='#/dashboard'; this.route(); }
      else Utils.toast(r.message,'error');
      return false;
    },

    toggleTheme() { const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('iut-theme',t); this.route(); },

    modal(title,body,footer,lg) {
      document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)document.getElementById(\'modal-root\').innerHTML=\'\'"><div class="modal '+(lg?'modal-lg':'')+'"><div class="modal-header"><span class="modal-title">'+title+'</span><button class="modal-close" onclick="document.getElementById(\'modal-root\').innerHTML=\'\'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="modal-body">'+body+'</div><div class="modal-footer">'+footer+'</div></div></div>';
    },
    closeModal() { document.getElementById('modal-root').innerHTML=''; },

    addAudit(action, details) {
      const logs = JSON.parse(localStorage.getItem('iut-audit')||'[]');
      const u = Auth.getUser();
      logs.unshift({ id:'log-'+Date.now(), date:new Date().toISOString(), user:(u?u.firstName+' '+u.lastName:'Systeme'), userEmail:u?.email||'', action:action, details:details });
      if (logs.length > 500) logs.length = 500;
      localStorage.setItem('iut-audit', JSON.stringify(logs));
    },

    getDepts() { let d=JSON.parse(localStorage.getItem('iut-depts')||'null'); if(!d){d=CONFIG.DEPARTMENTS.map((x,i)=>({...x,id:'dept-'+i,headName:''}));localStorage.setItem('iut-depts',JSON.stringify(d));} return d; },
    getProgs() { let p=JSON.parse(localStorage.getItem('iut-progs')||'null'); if(!p){p=[];Object.entries(CONFIG.PROGRAMS).forEach(([dept,ps])=>{ps.forEach(x=>p.push({...x,dept,id:'prog-'+p.length,headName:''}))});localStorage.setItem('iut-progs',JSON.stringify(p));} return p; },
    getCats() { let c=JSON.parse(localStorage.getItem('iut-cats')||'null'); if(!c){c=CONFIG.CATEGORIES;localStorage.setItem('iut-cats',JSON.stringify(c));} return c; },

    /* ===================== DASHBOARD ===================== */
    pgDash() {
      const reqs=RequestStore.getAll(), students=Auth.getAllUsers().filter(u=>u.role==='STUDENT').length, admins=Auth.getAllUsers().filter(u=>u.role==='ADMIN').length;
      const pending=reqs.filter(r=>['SUBMITTED','RECEIVED'].includes(r.status)).length;
      const byStatus={}; reqs.forEach(r=>{byStatus[r.status]=(byStatus[r.status]||0)+1;});
      const byCat={}; reqs.forEach(r=>{const n=r.categoryName||'Autre';byCat[n]=(byCat[n]||0)+1;});
      const oldest=reqs.filter(r=>['SUBMITTED','RECEIVED','IN_PROGRESS'].includes(r.status)).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).slice(0,5);

      return `
      <div class="page-header"><h1 class="page-title">Tableau de bord global</h1></div>
      <div class="stats-grid mb-3">
        <div class="card stat-card"><div class="stat-icon" style="background:var(--primary-light);color:var(--primary)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div><div><div class="stat-value">${reqs.length}</div><div class="stat-label">Total requetes</div></div></div>
        <div class="card stat-card"><div class="stat-icon" style="background:var(--yellow-light);color:var(--yellow-dark)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="stat-value">${pending}</div><div class="stat-label">En attente</div></div></div>
        <div class="card stat-card"><div class="stat-icon" style="background:var(--green-light);color:var(--green)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="stat-value">${students}</div><div class="stat-label">Etudiants</div></div></div>
        <div class="card stat-card"><div class="stat-icon" style="background:#F3E5F5;color:#7B1FA2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div><div class="stat-value">${admins}</div><div class="stat-label">Administrateurs</div></div></div>
      </div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
        <div class="card"><div class="card-header"><span class="card-title">Repartition par statut</span></div>
          ${Object.keys(byStatus).length>0?Object.entries(byStatus).map(([s,c])=>'<div class="flex items-center justify-between" style="padding:6px 0">'+Utils.statusBadge(s)+'<span class="fw-600">'+c+'</span></div>').join(''):'<p class="text-muted">Aucune donnee</p>'}
        </div>
        <div class="card"><div class="card-header"><span class="card-title">Repartition par categorie</span></div>
          ${Object.keys(byCat).length>0?Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n,c])=>'<div class="flex items-center justify-between" style="padding:6px 0"><span style="font-size:13px">'+Utils.escapeHtml(n)+'</span><span class="fw-600">'+c+'</span></div>').join(''):'<p class="text-muted">Aucune donnee</p>'}
        </div>
      </div>
      ${oldest.length>0?'<div class="card mt-3"><div class="card-header"><span class="card-title" style="color:var(--yellow-dark)">Requetes en attente les plus anciennes</span><a href="#/requests" class="btn btn-ghost btn-sm">Tout voir</a></div><div class="table-container"><table><thead><tr><th>Reference</th><th>Objet</th><th>Etudiant</th><th>Statut</th><th>Date</th></tr></thead><tbody>'+oldest.map(r=>'<tr style="cursor:pointer" onclick="location.hash=\'#/requests/'+r.id+'\'"><td class="font-mono text-primary" style="font-size:13px">'+r.referenceNumber+'</td><td>'+Utils.escapeHtml(r.title)+'</td><td class="text-muted" style="font-size:13px">'+(r.studentName||'')+'</td><td>'+Utils.statusBadge(r.status)+'</td><td class="text-muted" style="font-size:13px">'+Utils.formatDate(r.createdAt)+'</td></tr>').join('')+'</tbody></table></div></div>':''}`;
    },

    /* ===================== REQUETES + RECHERCHE ===================== */
    pgReqs() {
      const all=RequestStore.getAll();
      const search=localStorage.getItem('sa-search')||'';
      let reqs=search?all.filter(r=>r.referenceNumber.toLowerCase().includes(search.toLowerCase())||r.title.toLowerCase().includes(search.toLowerCase())||(r.studentName||'').toLowerCase().includes(search.toLowerCase())):all;
      reqs=reqs.slice().reverse();
      return `
      <div class="page-header"><h1 class="page-title">Toutes les requetes (${all.length})</h1></div>
      <div class="card">
        <div class="filters">
          <div class="search-wrapper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="form-input" id="sa-search" placeholder="Rechercher par reference, objet ou etudiant..." value="${Utils.escapeHtml(search)}" oninput="localStorage.setItem('sa-search',this.value);SA.route()"></div>
          ${search?'<button class="btn btn-ghost btn-sm" onclick="localStorage.removeItem(\'sa-search\');SA.route()">Reinitialiser</button>':''}
        </div>
        ${reqs.length>0?'<div class="table-container"><table><thead><tr><th>Reference</th><th>Objet</th><th>Etudiant</th><th>Dept</th><th>Categorie</th><th>Statut</th><th>Date</th></tr></thead><tbody>'+reqs.map(r=>'<tr style="cursor:pointer" onclick="location.hash=\'#/requests/'+r.id+'\'"><td class="font-mono text-primary" style="font-size:13px">'+r.referenceNumber+'</td><td>'+Utils.escapeHtml(r.title)+'</td><td class="text-secondary" style="font-size:13px">'+(r.studentName||'')+'</td><td class="text-muted" style="font-size:13px">'+(r.department||'')+'</td><td class="text-secondary" style="font-size:13px">'+(r.categoryName||'')+'</td><td>'+Utils.statusBadge(r.status)+'</td><td class="text-muted" style="font-size:13px">'+Utils.formatDate(r.createdAt)+'</td></tr>').join('')+'</tbody></table></div>':'<div class="empty-state"><p>Aucune requete trouvee</p></div>'}
      </div>`;
    },

    pgReqDetail(id) {
      const req=RequestStore.getById(id);
      if(!req) return '<div class="empty-state"><h2>Requete non trouvee</h2><a href="#/requests" class="btn btn-primary mt-2">Retour</a></div>';
      const filesList=(req.fileNames||[]).length>0?'<h4 style="margin-top:16px;font-size:13px;color:var(--text-muted)">Pieces jointes :</h4><div class="file-list">'+req.fileNames.map(f=>'<div class="file-item"><div class="file-item-info"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg> '+Utils.escapeHtml(f)+'</div></div>').join('')+'</div>':'';
      return `
      <div class="flex items-center gap-2 mb-3"><a href="#/requests" class="btn btn-ghost btn-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a><div class="flex-1"><h1 class="page-title" style="font-size:1.25rem">${Utils.escapeHtml(req.title)}</h1><p class="text-muted font-mono" style="font-size:13px">${req.referenceNumber}</p></div>${Utils.statusBadge(req.status)}<button class="btn btn-ghost btn-sm" onclick="window.print()">Imprimer</button><button class="btn btn-danger btn-sm" onclick="if(confirm('Supprimer la requete '+${JSON.stringify(req.referenceNumber)}+' ?')){RequestStore.delete('${id}');Utils.toast('Requete supprimee','success');location.hash='#/requests'}">Supprimer</button></div>
      <div class="card mb-3"><h3 class="card-title mb-2">Description</h3><p style="white-space:pre-wrap;font-size:14px;color:var(--text-secondary)">${Utils.escapeHtml(req.description)}</p>${filesList}</div>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:16px">
        <div class="card"><h4 class="card-title mb-2">Informations</h4><div style="font-size:14px">
          <div class="flex justify-between mb-1"><span class="text-muted">Etudiant</span><span class="fw-600">${req.studentName||'-'}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Email</span><span style="font-size:12px">${req.studentEmail||'-'}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Telephone</span><span>${req.studentPhone||'-'}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Matricule</span><span>${req.studentMatricule||'-'}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Departement</span><span>${req.department||'-'}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Filiere</span><span>${req.program||'-'}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Categorie</span><span>${req.categoryName||'-'}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Cree le</span><span style="font-size:12px">${Utils.formatDateTime(req.createdAt)}</span></div>
          <div class="flex justify-between mb-1"><span class="text-muted">Relances</span><span>${req.reminderCount||0}</span></div>
        </div></div>

      this.modal(s?'Modifier le Super Admin':'Nouveau Super Administrateur',
        (!s?'<div class="form-group"><label class="form-label">Adresse e-mail *</label><input type="email" class="form-input" id="sa-f-email"></div><div class="form-group"><label class="form-label">Mot de passe *</label><input type="password" class="form-input" id="sa-f-pwd" placeholder="Min. 8 caracteres"></div>':'<div class="form-group"><label class="form-label">E-mail</label><input class="form-input" id="sa-f-email" value="'+s.email+'"></div><div class="form-group"><label class="form-label">Nouveau mot de passe (laisser vide pour garder)</label><input type="password" class="form-input" id="sa-f-pwd"></div>')+
        '<div class="form-row"><div class="form-group"><label class="form-label">Prenom *</label><input class="form-input" id="sa-f-fn" value="'+(s?.firstName||'')+'"></div><div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="sa-f-ln" value="'+(s?.lastName||'')+'"></div></div><div class="form-group"><label class="form-label">Telephone</label><input class="form-input" id="sa-f-ph" value="'+(s?.phone||'')+'"></div>',
        '<button class="btn btn-secondary" onclick="SA.closeModal()">Annuler</button><button class="btn btn-primary" onclick="SA.saveSA(\''+(id||'')+'\')">Enregistrer</button>');
    },
    saveSA(id) {
      const fn=document.getElementById('sa-f-fn').value,ln=document.getElementById('sa-f-ln').value,ph=document.getElementById('sa-f-ph').value,em=document.getElementById('sa-f-email').value,pw=document.getElementById('sa-f-pwd').value;
      if(!fn||!ln||!em){Utils.toast('Prenom, nom et e-mail requis','error');return;}
      if(id) {
        const updates={firstName:fn,lastName:ln,phone:ph,email:em};
        if(pw) updates.password=pw;
        Auth.updateUser(id,updates);
        const cur=Auth.getUser(); if(cur&&cur.id===id) Auth.updateProfile(updates);
      } else {
        if(!pw||pw.length<8){Utils.toast('Mot de passe requis (min. 8 caracteres)','error');return;}
        const users=Auth.getAllUsers();
        if(users.find(u=>u.email===em)){Utils.toast('E-mail deja utilise','error');return;}
        users.push({id:'usr-'+Date.now(),email:em,password:pw,firstName:fn,lastName:ln,phone:ph,role:'SUPER_ADMIN',isActive:true,emailVerified:true,createdAt:new Date().toISOString()});
        localStorage.setItem('iut-users',JSON.stringify(users));
      }
      this.addAudit('SUPER_ADMIN',id?'Modifie: '+fn+' '+ln:'Cree: '+fn+' '+ln+' ('+em+')');
      this.closeModal();Utils.toast('Enregistre','success');this.route();
    },

    /* ===================== TOUS LES COMPTES ===================== */
    pgUsers() { const us=Auth.getAllUsers(); const rl={STUDENT:'Etudiant',ADMIN:'Administrateur',SUPER_ADMIN:'Super Admin'}; const rb={STUDENT:'badge-draft',ADMIN:'badge-submitted',SUPER_ADMIN:'badge-reopened'}; return `<div class="page-header"><h1 class="page-title">Tous les comptes (${us.length})</h1></div><div class="card" style="padding:0"><div class="table-container"><table><thead><tr><th>Nom</th><th>E-mail</th><th>Role</th><th>Departement</th><th>Statut</th><th>Date</th></tr></thead><tbody>${us.map(u=>'<tr><td><div class="flex items-center gap-2"><div class="user-avatar" style="width:32px;height:32px;font-size:11px">'+(u.firstName?.[0]||'')+(u.lastName?.[0]||'')+'</div><div><p class="fw-600" style="font-size:14px">'+u.firstName+' '+u.lastName+'</p>'+(u.matricule?'<p class="text-muted" style="font-size:11px">'+u.matricule+'</p>':'')+'</div></div></td><td class="text-secondary" style="font-size:13px">'+u.email+'</td><td><span class="badge '+(rb[u.role]||'badge-draft')+'">'+(rl[u.role]||u.role)+'</span></td><td class="text-muted" style="font-size:13px">'+(u.department||(u.departmentIds?u.departmentIds.join(', '):'-'))+'</td><td><span class="badge '+(u.isActive?'badge-validated':'badge-rejected')+'">'+(u.isActive?'Actif':'Inactif')+'</span></td><td class="text-muted" style="font-size:13px">'+Utils.formatDate(u.createdAt)+'</td></tr>').join('')}</tbody></table></div></div>`; },

    /* ===================== JOURNAL D'AUDIT ===================== */
    pgAudit() {
      const logs=JSON.parse(localStorage.getItem('iut-audit')||'[]');
      return `
      <div class="page-header"><h1 class="page-title">Journal d'audit (${logs.length})</h1>${logs.length>0?'<button class="btn btn-outline btn-sm" onclick="if(confirm(\'Vider le journal ?\')){ localStorage.removeItem(\'iut-audit\');SA.route();}">Vider</button>':''}</div>
      <div class="card" style="padding:0">
        ${logs.length>0?'<div class="table-container"><table><thead><tr><th>Date</th><th>Utilisateur</th><th>Action</th><th>Details</th></tr></thead><tbody>'+logs.slice(0,100).map(l=>'<tr><td class="text-muted" style="font-size:12px;white-space:nowrap">'+Utils.formatDateTime(l.date)+'</td><td style="font-size:13px">'+Utils.escapeHtml(l.user||'-')+'<br><span class="text-muted" style="font-size:11px">'+(l.userEmail||'')+'</span></td><td><span class="badge badge-submitted" style="font-size:11px">'+l.action+'</span></td><td class="text-secondary" style="font-size:13px">'+Utils.escapeHtml(l.details||'-')+'</td></tr>').join('')+'</tbody></table></div>':'<div class="empty-state"><p>Le journal se remplit automatiquement a chaque action effectuee sur la plateforme (creation, modification, suppression, connexion).</p></div>'}
      </div>`;
    },

    /* ===================== NOTIFICATIONS ===================== */
    pgNotifs() { const u=Auth.getUser(); const ns=NotifStore.getAll(u.id); return `<div class="page-header"><h1 class="page-title">Notifications</h1></div><div class="card" style="padding:0">${ns.length>0?ns.map(n=>'<div style="display:flex;align-items:flex-start;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)"><div style="flex:1"><p class="fw-600" style="font-size:14px">'+n.title+'</p><p class="text-secondary" style="font-size:13px;margin-top:2px">'+n.message+'</p><p class="text-muted" style="font-size:12px;margin-top:4px">'+Utils.timeAgo(n.createdAt)+'</p></div></div>').join(''):'<div class="empty-state"><p>Aucune notification</p></div>'}</div>`; },

    /* ===================== PROFIL ===================== */
    pgProfile() {
      const u=Auth.getUser();
      return `
      <div style="max-width:640px">
        <h1 class="page-title mb-3">Mon profil</h1>
        <div class="card mb-3">
          <div class="flex items-center gap-3 mb-3"><div class="user-avatar" style="width:56px;height:56px;font-size:20px">${u.firstName?.[0]}${u.lastName?.[0]}</div><div><p class="fw-600" style="font-size:18px">${u.firstName} ${u.lastName}</p><p class="text-muted" style="font-size:13px">${u.email}</p><p class="badge badge-reopened mt-1">Super Administrateur</p></div></div>
          <form onsubmit="return SA.updateProfile(event)">
            <div class="form-row"><div class="form-group"><label class="form-label">Prenom</label><input class="form-input" id="sp-fn" value="${u.firstName}"></div><div class="form-group"><label class="form-label">Nom</label><input class="form-input" id="sp-ln" value="${u.lastName}"></div></div>
            <div class="form-group"><label class="form-label">E-mail</label><input type="email" class="form-input" id="sp-email" value="${u.email}"></div>
            <div class="form-group"><label class="form-label">Telephone</label><input class="form-input" id="sp-phone" value="${u.phone||''}"></div>
            <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
            <div class="form-group"><label class="form-label">Nouveau mot de passe (laisser vide pour ne pas changer)</label><input type="password" class="form-input" id="sp-pwd"></div>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
          </form>
        </div>
        <div class="card">
          <h3 class="card-title mb-2">Informations pour les notifications WhatsApp/SMS</h3>
          <p class="text-secondary" style="font-size:14px;margin-bottom:12px">Pour activer les notifications par WhatsApp et SMS, vous devez integrer un service tiers. Voici les options recommandees :</p>
          <div style="font-size:14px;line-height:1.8">
            <p><strong>WhatsApp Business API :</strong> Utilisez Twilio (<a href="https://www.twilio.com/whatsapp" target="_blank" style="color:var(--primary)">twilio.com/whatsapp</a>) ou Meta Business Platform. Necessite un compte WhatsApp Business verifie et une cle API.</p>
            <p><strong>SMS :</strong> Utilisez Twilio SMS (<a href="https://www.twilio.com/sms" target="_blank" style="color:var(--primary)">twilio.com/sms</a>) ou Orange SMS API pour le Cameroun. Necessite un numero virtuel et des credits SMS.</p>
            <p><strong>Integration :</strong> Une fois le compte cree, ajoutez les cles API dans la configuration Supabase (Edge Functions) pour envoyer automatiquement les notifications.</p>
          </div>
        </div>
      </div>`;
    },
    updateProfile(e) { e.preventDefault(); const up={firstName:document.getElementById('sp-fn').value,lastName:document.getElementById('sp-ln').value,email:document.getElementById('sp-email').value,phone:document.getElementById('sp-phone').value}; const pw=document.getElementById('sp-pwd').value; if(pw)up.password=pw; const u=Auth.getUser(); Auth.updateUser(u.id,up); Auth.updateProfile(up); this.addAudit('PROFIL','Profil Super Admin modifie'); Utils.toast('Profil mis a jour','success'); this.route(); return false; },
  };

  document.addEventListener('DOMContentLoaded', () => SA.init());
  </script>
</body>
</html>
